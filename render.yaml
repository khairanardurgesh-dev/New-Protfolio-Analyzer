services:
  # Web Service
  - type: web
    name: devportfolio
    env: python
    plan: free
    buildCommand: "pip install -r requirements_prod.txt && python manage.py collectstatic --noinput"
    startCommand: "./start.sh"
    healthCheckPath: /
    autoDeploy: true
    
    # Environment Variables (set these in Render dashboard)
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: devportfolio-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: ALLOWED_HOSTS
        value: devportfolio.onrender.com
      - key: PYTHONPATH
        value: "/opt/render/project/src"

  # PostgreSQL Database
  - type: pserv
    name: devportfolio-db
    plan: free
    databaseName: portfolio_analyzer
    user: devportfolio

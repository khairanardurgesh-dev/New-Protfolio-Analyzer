services:
  # Web Service
  - type: web
    name: codepulse
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput && python manage.py check --deploy"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3"
    healthCheckPath: /
    autoDeploy: true
    
    # Environment Variables (set these in Render dashboard)
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: codepulse-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: ALLOWED_HOSTS
        value: new-protfolio-analyzer.onrender.com
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"

  # PostgreSQL Database
  - type: pserv
    name: codepulse-db
    plan: free
    databaseName: portfolio_analyzer
    user: codepulse
